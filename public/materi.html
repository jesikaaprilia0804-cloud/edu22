<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Materi EduSmart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">
  <header class="topbar">
    <div class="logo-area">
      <div class="logo-circle">ES</div>
      <div>
        <div class="title">EduSmart</div>
        <div class="subtle">Halaman materi</div>
      </div>
    </div>

    <nav class="menu">
      <a href="dashboard.html" class="menu-btn">Dashboard</a>
      <a href="materi.html" class="menu-btn active">Materi</a>
      <a href="quiz.html" class="menu-btn">Quiz</a>
      <a href="kelas.html" class="menu-btn">Kelas</a>
      <a href="profil.html" class="menu-btn">Profil</a>
      <button onclick="logout()" class="btn-logout">Keluar</button>
    </nav>
  </header>

  <main class="dashboard-container">
    <section class="section-shell">
      <div class="page-head">
        <div>
          <p class="eyebrow">PUSAT MATERI</p>
          <h1 id="featureTitle">Materi pembelajaran</h1>
          <p id="featureDescription">Semua materi tersusun berdasarkan topik agar lebih mudah dipelajari maupun dikelola.</p>
          <div class="filter-row">
            <span class="filter-chip">📘 Modul</span>
            <span class="filter-chip">🎥 Video</span>
            <span class="filter-chip">🧠 Ringkasan</span>
          </div>
        </div>

        <div id="materiControls">
          <button class="ghost-btn" id="featureAction" type="button">Tambah materi</button>
        </div>
      </div>

      <div class="feature-grid" id="materiGrid"></div>
    </section>
  </main>

  <!-- Modal Tambah Materi -->
  <div id="modalTambahMateri" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Tambah Materi</h2>
        <button type="button" class="modal-close" onclick="toggleModal('modalTambahMateri')">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="inputJudulMateri">Judul materi</label>
          <input type="text" id="inputJudulMateri" placeholder="Masukkan judul materi">
        </div>

        <div class="form-group">
          <label for="inputDeskripsiMateri">Deskripsi</label>
          <textarea id="inputDeskripsiMateri" rows="4" placeholder="Masukkan deskripsi materi"></textarea>
        </div>

        <div class="form-group">
          <label for="inputKategoriMateri">Jenis materi</label>
          <select id="inputKategoriMateri">
            <option value="Modul">📘 Modul</option>
            <option value="Video">🎥 Video</option>
            <option value="Ringkasan">🧠 Ringkasan</option>
          </select>
        </div>

        <div class="form-group">
          <label for="inputLinkMateri">Link sumber</label>
          <input type="url" id="inputLinkMateri" placeholder="https://contoh.com/materi">
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="ghost-btn" onclick="toggleModal('modalTambahMateri')">Batal</button>
        <button type="button" class="btn-buka" onclick="simpanMateriBaru()">Simpan Materi</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="script.js"></script>
</body>
</html>
