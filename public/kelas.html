<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kelas EduSmart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page" onload="initFeaturePage('kelas')">
  <header class="topbar">
    <div class="logo-area">
      <div class="logo-circle">ES</div>
      <div>
        <div class="title">EduSmart</div>
        <div class="subtle">Halaman kelas</div>
      </div>
    </div>
    <nav class="menu">
      <a href="dashboard.html" class="menu-btn">Dashboard</a>
      <a href="materi.html" class="menu-btn">Materi</a>
      <a href="quiz.html" class="menu-btn">Quiz</a>
      <a href="kelas.html" class="menu-btn active">Kelas</a>
      <a href="profil.html" class="menu-btn">Profil</a>
      <button onclick="logout()" class="btn-logout">Keluar</button>
    </nav>
  </header>

  <main class="dashboard-container">
    <section class="section-shell">
      <div class="page-head">
        <div>
          <p class="eyebrow">Ruang belajar</p>
          <h1 id="featureTitle">Kelas aktif dan jadwal</h1>
          <p id="featureDescription">Pantau kelas, jadwal, forum diskusi, serta aktivitas terbaru dalam satu halaman.</p>
          <div class="filter-row">
            <span class="filter-chip">🏫 Kelas aktif</span>
            <span class="filter-chip">📣 Pengumuman</span>
            <span class="filter-chip">📅 Jadwal</span>
          </div>
        </div>
        <button class="ghost-btn" id="featureAction">Kelola kelas</button>
      </div>

      <div class="feature-grid" id="featureGrid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
