<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz EduSmart - Evaluasi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page" onload="initQuizPage()">
  <header class="topbar">
    <div class="logo-area">
      <div class="logo-circle">ES</div>
      <div>
        <div class="title">EduSmart</div>
        <div class="subtle">Halaman Quiz</div>
      </div>
    </div>

    <nav class="menu">
      <a href="dashboard.html" class="menu-btn">Dashboard</a>
      <a href="materi.html" class="menu-btn">Materi</a>
      <a href="quiz.html" class="menu-btn active">Quiz</a>
      <a href="kelas.html" class="menu-btn">Kelas</a>
      <a href="profil.html" class="menu-btn">Profil</a>
      <button onclick="logout()" class="btn-logout">Keluar</button>
    </nav>
  </header>

  <main class="dashboard-container">
    <section id="quizWorkArea" class="hidden section-shell" style="background:#fff; border:2px solid #e67e22; padding:25px; border-radius:15px; margin-bottom:25px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:16px; flex-wrap:wrap;">
        <h2 id="quizActiveTitle" style="color:#e67e22; margin:0;">Ujian Berlangsung</h2>
        <div id="timerDisplay" style="font-weight:bold; color:#e74c3c; background:#ffebeb; padding:10px 20px; border-radius:8px; font-size:1.2rem;">
          Sisa Waktu: --:--
        </div>
      </div>
      <div id="soalKonten" style="font-size:1.1rem; line-height:1.6;"></div>
    </section>

    <section class="section-shell">
      <div class="page-head">
        <div>
          <p class="eyebrow">Pusat Evaluasi</p>
          <h1>Daftar Quiz Aktif</h1>
          <p>Pilih quiz yang tersedia untuk kelas Anda.</p>
        </div>
        <button class="ghost-btn" id="btnCreateQuiz" type="button">Buat Quiz</button>
      </div>

      <div class="feature-grid" id="quizGrid"></div>
    </section>

    <section id="quizScoreSection" class="section-shell hidden" style="margin-top:24px;">
      <div class="page-head">
        <div>
          <p class="eyebrow">Hasil Quiz</p>
          <h2 id="nilaiSectionTitle">Nilai Quiz</h2>
          <p id="nilaiSectionDesc">Daftar nilai siswa akan tampil di sini.</p>
        </div>
      </div>

      <div id="nilaiQuizList" class="feature-grid"></div>
    </section>
  </main>

  <div id="modalQuiz" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:760px; max-height:90vh; overflow-y:auto;">
      <div class="modal-header" style="position:sticky; top:0; background:#fff; z-index:2; padding-bottom:12px;">
        <h3>Tambah Quiz Baru</h3>
        <button type="button" class="modal-close" onclick="toggleModal('modalQuiz')">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="quizTitle">Judul Quiz</label>
          <input type="text" id="quizTitle" placeholder="Contoh: Quiz IPA Bab 1">
        </div>

        <div class="form-group">
          <label for="quizKelasSelect">Pilih Kelas</label>
          <select id="quizKelasSelect" style="width:100%; padding:10px;">
            <option value="">Pilih kelas</option>
          </select>
        </div>

        <div class="form-group">
          <label for="quizDuration">Durasi (Menit)</label>
          <input type="number" id="quizDuration" placeholder="Contoh: 15">
        </div>

        <hr style="margin:16px 0; border:none; border-top:1px solid #ddd;">

        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:12px;">
          <h4 id="formSoalTitle" style="margin:0;">Soal 1</h4>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button type="button" class="ghost-btn" onclick="simpanSoalSementara()">Simpan Soal</button>
            <button type="button" class="ghost-btn" onclick="resetFormSoalAktif()">Reset Form</button>
          </div>
        </div>

        <div class="form-group">
          <label for="soalText">Pertanyaan</label>
          <textarea id="soalText" placeholder="Tuliskan pertanyaan..." style="height:100px;"></textarea>
        </div>

        <div class="form-group">
          <label for="optA">Pilihan A</label>
          <input type="text" id="optA" placeholder="Pilihan A">
        </div>

        <div class="form-group">
          <label for="optB">Pilihan B</label>
          <input type="text" id="optB" placeholder="Pilihan B">
        </div>

        <div class="form-group">
          <label for="optC">Pilihan C</label>
          <input type="text" id="optC" placeholder="Pilihan C">
        </div>

        <div class="form-group">
          <label for="optD">Pilihan D</label>
          <input type="text" id="optD" placeholder="Pilihan D">
        </div>
        
        <div class="form-group">
          <label for="kunciJawaban">Jawaban Benar</label>
          <select id="kunciJawaban" style="width:100%; padding:10px;">
            <option value="a">Jawaban Benar: A</option>
            <option value="b">Jawaban Benar: B</option>
            <option value="c">Jawaban Benar: C</option>
            <option value="d">Jawaban Benar: D</option>
          </select>
        </div>

        <hr style="margin:20px 0; border:none; border-top:1px solid #ddd;">

        <div>
          <h4 style="margin-bottom:12px;">Daftar Soal Tersimpan</h4>
          <div id="previewSoalList"></div>
        </div>
      </div>

      <div class="modal-actions" style="position:sticky; bottom:0; background:#fff; padding-top:12px; margin-top:20px; display:flex; justify-content:flex-end; gap:12px;">
        <button type="button" onclick="simpanQuizBaru()" class="btn-buka">Publikasikan</button>
        <button type="button" onclick="toggleModal('modalQuiz')" class="ghost-btn">Batal</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="script.js"></script>
</body>
</html>
